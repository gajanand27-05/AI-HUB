<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI HUB - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="flex-center">
    <div class="glass-card login-card">
      
      <!-- Login View -->
      <div id="login-view">
        <h2>Welcome Back</h2>
        <p class="text-muted">Login to access AI HUB tools</p>
        <form id="login-form">
          <div class="input-group">
            <label>Email</label>
            <input type="email" required placeholder="name@domain.com">
          </div>
          <div class="input-group">
            <label>Password</label>
            <input type="password" required placeholder="Enter password">
          </div>
          <button type="button" class="btn-primary w-100" onclick="window.location.href='chatbot.html'">Login</button>
        </form>
        <p class="switch-mode">New to AI HUB? <span onclick="toggleView('signup')">Create an account</span></p>
      </div>

      <!-- Sign Up View -->
      <div id="signup-view" class="hidden">
        <h2>Create Account</h2>
        <p class="text-muted">Authenticate via mail to join</p>
        <form id="signup-form" onsubmit="handleSignup(event)">
          <div class="input-group">
            <label>Username</label>
            <input type="text" required placeholder="Choose a unique username">
          </div>
          <div class="input-group">
            <label>Email</label>
            <input id="signup-email" type="email" required placeholder="Enter your email address">
          </div>
          <div class="input-group">
            <label>Password</label>
            <input type="password" required placeholder="Create a strong password">
          </div>
          <button type="submit" class="btn-primary w-100">Create Account</button>
        </form>
        <p class="switch-mode">Already registered? <span onclick="toggleView('login')">Login here</span></p>
      </div>

    </div>
  </div>

  <script>
    function toggleView(view) {
      if(view === 'signup') {
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('signup-view').classList.remove('hidden');
      } else {
        document.getElementById('signup-view').classList.add('hidden');
        document.getElementById('login-view').classList.remove('hidden');
      }
    }

    function handleSignup(event) {
      event.preventDefault();
      const email = document.getElementById('signup-email').value;
      
      const btn = event.target.querySelector('button');
      btn.innerText = 'Sending Mail...';
      btn.disabled = true;
      btn.style.opacity = '0.7';

      // Simulate a network delay for sending the email
      setTimeout(() => {
        btn.innerText = 'Verification Sent!';
        btn.style.backgroundColor = 'rgba(16, 185, 129, 0.2)';
        btn.style.borderColor = '#10b981';
        btn.style.boxShadow = '0 0 15px rgba(16, 185, 129, 0.5)';
        
        // Create an attractive modal overlay to confirm the email was "sent"
        const modal = document.createElement('div');
        modal.className = 'glass-card';
        modal.style.position = 'fixed';
        modal.style.top = '50%';
        modal.style.left = '50%';
        modal.style.transform = 'translate(-50%, -50%)';
        modal.style.zIndex = '1000';
        modal.style.textAlign = 'center';
        modal.style.maxWidth = '400px';
        modal.style.width = '90%';
        modal.style.boxShadow = '0 0 50px rgba(16, 185, 129, 0.3)';
        
        modal.innerHTML = `
          <div style="font-size: 3rem; margin-bottom: 1rem;">✉️</div>
          <h2 style="color: #10b981; margin-bottom: 1rem; font-size: 1.5rem;">Verification Email Sent!</h2>
          <p class="text-muted" style="margin-bottom: 2rem; line-height: 1.5;">We've successfully dispatched a confirmation link to <br><strong style="color: var(--text-main);">${email}</strong>.<br><br>Please check your inbox and verify your address to fully activate your account.</p>
          <button class="btn-primary" style="background:#10b981; border:none; color:#000;" onclick="window.location.href='chatbot.html'">Continue to Dashboard</button>
        `;
        
        const overlay = document.createElement('div');
        overlay.style.position = 'fixed';
        overlay.style.inset = '0';
        overlay.style.backgroundColor = 'rgba(0,0,0,0.85)';
        overlay.style.backdropFilter = 'blur(5px)';
        overlay.style.zIndex = '999';
        
        document.body.appendChild(overlay);
        document.body.appendChild(modal);
      }, 1800);
    }
  </script>
</body>
</html>
