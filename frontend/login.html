<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI HUB - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="flex-center">
    <div class="glass-card login-card">
      
      <!-- Login View -->
      <div id="login-view">
        <h2>Welcome Back</h2>
        <p class="text-muted">Login to access AI HUB tools</p>
        <div id="login-error" class="auth-error hidden"></div>
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="input-group">
            <label>Email or Username</label>
            <input type="text" id="login-identifier" required placeholder="Enter email or username">
          </div>
          <div class="input-group">
            <label>Password</label>
            <input type="password" id="login-password" required placeholder="Enter password">
          </div>
          <button type="submit" id="login-btn" class="btn-primary w-100">Login</button>
        </form>
        <p class="switch-mode">New to AI HUB? <span onclick="toggleView('signup')">Create an account</span></p>
      </div>

      <!-- Sign Up View -->
      <div id="signup-view" class="hidden">
        <h2>Create Account</h2>
        <p class="text-muted">Join AI HUB to access all tools</p>
        <div id="signup-error" class="auth-error hidden"></div>
        <form id="signup-form" onsubmit="handleSignup(event)">
          <div class="input-group">
            <label>Username</label>
            <input type="text" id="signup-username" required placeholder="Choose a unique username">
          </div>
          <div class="input-group">
            <label>Email</label>
            <input id="signup-email" type="email" required placeholder="Enter your email address">
          </div>
          <div class="input-group">
            <label>Password</label>
            <input type="password" id="signup-password" required placeholder="Create a strong password">
          </div>
          <button type="submit" id="signup-btn" class="btn-primary w-100">Create Account</button>
        </form>
        <p class="switch-mode">Already registered? <span onclick="toggleView('login')">Login here</span></p>
      </div>

    </div>
  </div>

  <script>
    const API_BASE = '';

    // If already logged in, redirect
    if (localStorage.getItem('ai_hub_token')) {
      window.location.href = 'chatbot.html';
    }

    function toggleView(view) {
      if(view === 'signup') {
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('signup-view').classList.remove('hidden');
      } else {
        document.getElementById('signup-view').classList.add('hidden');
        document.getElementById('login-view').classList.remove('hidden');
      }
    }

    function showError(elementId, message) {
      const el = document.getElementById(elementId);
      el.innerHTML = '<strong>⚠️</strong> ' + message;
      el.classList.remove('hidden');
    }

    function hideError(elementId) {
      document.getElementById(elementId).classList.add('hidden');
    }

    async function handleLogin(event) {
      event.preventDefault();
      hideError('login-error');
      
      const identifier = document.getElementById('login-identifier').value;
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-btn');
      
      btn.innerText = 'Logging in...';
      btn.disabled = true;

      try {
        const response = await fetch(`${API_BASE}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || 'Login failed');
        }

        // Store token and username
        localStorage.setItem('ai_hub_token', data.token);
        localStorage.setItem('ai_hub_username', data.username);
        window.location.href = 'chatbot.html';

      } catch (error) {
        showError('login-error', error.message);
      } finally {
        btn.innerText = 'Login';
        btn.disabled = false;
      }
    }

    async function handleSignup(event) {
      event.preventDefault();
      hideError('signup-error');

      const username = document.getElementById('signup-username').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const btn = document.getElementById('signup-btn');

      btn.innerText = 'Creating Account...';
      btn.disabled = true;

      try {
        const response = await fetch(`${API_BASE}/api/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || 'Signup failed');
        }

        // Store token and username
        localStorage.setItem('ai_hub_token', data.token);
        localStorage.setItem('ai_hub_username', data.username);
        window.location.href = 'chatbot.html';

      } catch (error) {
        showError('signup-error', error.message);
      } finally {
        btn.innerText = 'Create Account';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
